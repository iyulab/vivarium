name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      # Unit tests only — the real-browser e2e harnesses (test/e2e*.html)
      # need a served browser session and stay a local/dev concern for now.
      - run: npm test

  # Consumer-contact smoke (Phase 5.a): a fresh consumer package installs this
  # repo and imports the public surface — catches breakage that only shows up
  # at first consumer contact (dangling deps, unresolvable exports).
  consumer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # Exports point at dist/ — build it first (folder installs don't run prepack).
      - run: npm ci
      - run: npm run build
      - name: Fresh consumer installs and imports @vivariumjs/runtime
        run: |
          mkdir "$RUNNER_TEMP/consumer" && cd "$RUNNER_TEMP/consumer"
          echo '{"name":"consumer","private":true,"type":"module"}' > package.json
          npm install --no-audit --no-fund "$GITHUB_WORKSPACE"
          node -e "import('@vivariumjs/runtime').then((m) => { const n = Object.keys(m).length; if (!n) throw new Error('empty surface'); console.log('imported', n, 'exports'); }).catch((e) => { console.error(e); process.exit(1); })"
